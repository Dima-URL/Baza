<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
</head>
<body>
  <form id="form">
    <label for="enter-email">Enter your Email</label>
    <input type="email" id="enter-email">
    <button type="submit">Send Email</button>
  </form>
  <span id="link"></span>

  <script>
    const link = document.getElementById('link');
    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('enter-email').value.trim();
      fetch('/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      })
        .then(res => res.json())
        .then(data => {
          link.innerHTML = `<a href='http://127.0.0.1:3000${data.link}'>Link to reset your password</a>`;
        })
    })

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token')
  </script>
</body>
</html>
