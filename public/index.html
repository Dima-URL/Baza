<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baza</title>
  <link rel="stylesheet" href="styles/styles_main.css">
  <link rel="stylesheet" href="styles/common_styles.css">
  <link rel="icon" href="/images/favicon.png">
</head>
<body>
  <dialog id="notify-global" class="notify">
    <span id="notify-text"></span>
    <button id="notify-close" class="notify-close-btn" aria-label="Close">
      <img src="./images/close.png" alt="x" style="width: 12px; height: 12px;">
    </button>
  </dialog>

  <header>
    <div class="header-inner">
      <div class="logo">BAZA</div>
      <p class="text-warning">
        Practice ground. No real data.
      </p>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1 class="hero-title">Secure Messaging Lab</h1>
      <p class="hero-subtitle">The ultimate training environment for AppSec and Web Development.</p>
      <div class="section-btns">
        <button type="button" class="btn register">Create Account</button>
        <button type="button" class="btn logIn">Sign In</button>
      </div>
    </section>
  </main>

    <dialog class="modal-register" id="modal-register">
      <form id="form-register">
        <h1 class="title-form">Register</h1>

        <label for="enter-username">
          Enter username:
          <input type="text" id="enter-username" name="username"
          placeholder="User1" value="" required minlength="3" maxlength="64">
        </label>

        <label for="enter-email">Enter fictional email:</label>
        <div class="input-group">
          <input type="text" id="enter-email" name="email" placeholder="User1" required>
          <span class="input-suffix">@baza.xyz</span>
        </div>

        <label for="enter-password" class="label-el-forms">
          Enter password:
          <input type="password" id="enter-password" name="password"
          placeholder="w&1KjR%5..." value="" required minlength="8" maxlength="128">
        </label>

        <div class="div-btn-create-login">
          <button type="submit" class="btn-create-account" id="btn-create-account">
            Create Account
          </button>
        </div>
      </form>

      <button id="close-modal-register">
        <img class="img-close-modal" style="width: 15px;" src="./images/close.png">
      </button>
    </dialog>

    <dialog class="modal-logIn" id="modal-logIn">
      <form id="form-logIn">
        <h1 class="title-form">Log In</h1>

        <label for="logIn-email" class="label-el-forms">
          Enter fictional email:
          <input type="email" id="logIn-email" name="email"
          placeholder="User1@baza.xyz" value="" required minlength="3" maxlength="137">
        </label>

        <label for="logIn-password" class="label-el-forms">
          Enter password:
          <input type="password" id="logIn-password" name="password"
          placeholder="w&1KjR%5..." value="" required minlength="8" maxlength="128">
        </label>

        <div class="div-btn-create-login">
          <button type="submit" class="btn-create-account" id="btn-LogIn">
            Log In
          </button>
        </div>
      </form>

      <button id="close-modal-logIn">
        <img class="img-close-modal" style="width: 15px;" src="./images/close.png">
      </button>
    </dialog>

  <script type="module" src="./scripts/script_main.js"></script>
</body>
</html>
