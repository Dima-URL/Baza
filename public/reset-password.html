<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
</head>
<body>
  <form id="form">
    <label for="password-1">Password</label>
    <input type="password" id="password-1">

    <label for="password-2">Confirm password</label>
    <input type="password" id="password-2">
    <button type="submit">Submit</button>
  </form>

  <script>
    document.getElementById('form').addEventListener('submit', (e) =>{
      e.preventDefault();
      const password_1 = document.querySelector('#password-1').value;
      const password_2 = document.querySelector('#password-2').value;
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      fetch('/reset-password', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({password_1, password_2, token})
      })
        .then(res => res.json())
        .then(data => {
          window.location.href = '/';
        })
    })
  </script>
</body>
</html>
