<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
</head>
<body>
  <dialog id="notify-global" class="notify">
    <span id="notify-text"></span>
    <button id="notify-close" class="notify-close-btn" aria-label="Close">
      <img src="./images/close.png" alt="x" style="width: 12px; height: 12px;">
    </button>
  </dialog>

  <form id="form">
    <label for="password-1">Password</label>
    <input type="password" id="password-1">

    <label for="password-2">Confirm password</label>
    <input type="password" id="password-2">
    <button type="submit">Submit</button>
  </form>

  <script src="./scripts/reset-password.js" type="module"></script>
</body>
</html>
