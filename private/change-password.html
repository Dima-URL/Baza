<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
</head>
<body>
  <form id="form">
    <label for="password-1">Password</label>
    <input type="email" id="password-1">

    <label for="password-2">Confirm password</label>
    <input type="email" id="password-2">
    <button type="submit">Submit</button>
  </form>

  <script>
    const password_1 = document.querySelector('#password-1').value;
    const password_2 = document.querySelector('#password-2').value;
    fetch('/forgot-change-password', {
      method: 'PUT',
      headers: { 'Comtent-Type': 'application/json' },
      body: JSON.stringify({password_1, password_2})
    })
      .then(res => res.json())
      .then(data => {
        
      })
  </script>
</body>
</html>
