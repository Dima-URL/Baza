<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>admin-panel</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .status-badge { background: #d9534f; color: white; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Panel <span class="status-badge">ADMIN</span></h1>
    <p>Welcome, <strong id="admin-name">...</strong>!</p>
    <hr>
    <p>Your access status has been confirmed by the server.</p>
    <a href="/profile">Come back to Profile</a>

    <script>
        // Проверяем, что API действительно отдает роль админа для этой страницы
        fetch("/api/profile")
            .then(res => res.json())
            .then(data => {
                document.getElementById("admin-name").innerText = data.username;
            })
            .catch(err => console.error("Error:", err));
    </script>
</body>
</html>
